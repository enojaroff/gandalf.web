
<form ng-submit="save(form)" name="form" novalidate="novalidate">
  <div class="modal-header">
    <h3 class="modal-title">Edit table name</h3>
  </div>
  <div class="modal-body">
    <div class="form-horizontal">
      <div class="form-group">
        <label class="col-sm-3 control-label">Table name</label>
        <div class="col-sm-9">
          <input class="form-control" ng-model="table.title" name="title" required="required"/>
          <div class="form-control-error" ng-messages="form.title.$error" ng-if="form.title.$dirty || form.$submitted">
            <div ng-message="required">{{'validation.errors.table_name_empty'|translate}}</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-3 control-label">Description</label>
        <div class="col-sm-9">
          <input class="form-control" ng-model="table.description" name="description" required="required"/>
          <div class="form-control-error" ng-messages="form.description.$error" ng-if="form.description.$dirty || form.$submitted">
            <div ng-message="required">{{'validation.errors.table_description_empty'|translate}}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer clearfix">
    <div class="pull-right">
      <button class="btn btn-warning" type="button" ng-click="cancel()">Cancel</button>
      <button class="btn btn-primary" type="submit">Save</button>
    </div>
  </div>
</form>
