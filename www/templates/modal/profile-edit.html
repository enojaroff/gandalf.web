
<form ng-submit="save(form)" name="form" novalidate="novalidate">
  <div class="modal-header">
    <h3 class="modal-title">Edit profile</h3>
  </div>
  <div class="modal-body">
    <div class="form-horizontal">
      <div class="form-group">
        <label class="col-sm-3 control-label">Username</label>
        <div class="col-sm-9">
          <input class="form-control" name="username" ng-model="user.username" pattern="^[a-zA-Z0-9-_.]+$" minlength="2" maxlength="32" placeholder="User name" autocomplete="off"/>
          <div class="form-control-error" ng-messages="form.username.$error" ng-if="form.username.$dirty || form.$submitted">
            <div ng-message="pattern">{{'validation.errors.invalid_username'|translate}}</div>
            <div ng-message="minlength">{{'validation.errors.username_minlength'|translate}}</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-3 control-label">Email</label>
        <div class="col-sm-9">
          <input class="form-control" type="email" name="email" ng-model="user.email" autocomplete="off" placeholder="E-mail address"/>
          <div class="form-control-error" ng-messages="form.email.$error" ng-if="form.email.$dirty || form.$submitted">
            <div ng-message="email">{{'validation.errors.invalid_email'|translate}}</div>
          </div>
        </div>
      </div>
      <hr/>
      <div class="form-group" show-errors="show-errors">
        <label class="col-sm-3 control-label">First name</label>
        <div class="col-sm-9">
          <input class="form-control" ng-model="user.firstName" placeholder="John" autocomplete="off"/>
        </div>
      </div>
      <div class="form-group" show-errors="show-errors">
        <label class="col-sm-3 control-label">Last name</label>
        <div class="col-sm-9 form-control-block">
          <input class="form-control" ng-model="user.lastName" placeholder="Smith" autocomplete="off"/>
        </div>
      </div>
      <hr/>
      <div class="form-group" show-errors="show-errors">
        <label class="col-sm-3 control-label">Password</label>
        <div class="col-sm-9 form-control-block">
          <input class="form-control" ng-model="password" name="password" placeholder="Enter password to save changes" type="password" required="required"/>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer clearfix">
    <div class="pull-right">
      <button class="btn btn-warning" type="button" ng-click="cancel()">Cancel</button>
      <button class="btn btn-primary" type="submit">Save</button>
    </div>
  </div>
</form>
