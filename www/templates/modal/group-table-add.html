
<form ng-submit="save(form)" name="form" novalidate="novalidate">
  <div class="modal-header">
    <h3 class="modal-title">Create variant</h3>
  </div>
  <div class="modal-body">
    <div class="form-horizontal">
      <div class="form-group">
        <label class="col-sm-3 control-label">From table</label>
        <div class="col-sm-9">
          <input class="form-control" type="text" ng-model="model.table" typeahead-min-length="0" typeahead-editable="false" uib-typeahead="table as table.title for table in group.tables | filter:$viewValue " required="required"/>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-3 control-label">Description</label>
        <div class="col-sm-9">
          <input class="form-control" ng-model="model.title" placeholder="e.g. Specify variant title"/>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-3 control-label">Clean rules?</label>
        <div class="col-sm-9">
          <div class="checkbox">
            <label>
              <input type="checkbox" ng-model="model.clean"/>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer clearfix">
    <div class="pull-right">
      <button class="btn btn-warning" type="button" ng-click="cancel()">Cancel</button>
      <button class="btn btn-primary" type="submit">Save</button>
    </div>
  </div>
</form>
