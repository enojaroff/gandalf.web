
<div class="modal-header">
  <h3 class="modal-title">Revert field {{field.name}}</h3>
</div>
<div class="modal-body">This column is marked as deleted. You can restore it before saving table.</div>
<div class="modal-footer">
  <button class="btn btn-default" type="button" ng-click="cancel()">Cancel</button>
  <button class="btn btn-success" type="button" ng-click="revert()">Revert</button>
</div>
