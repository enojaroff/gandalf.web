
<div class="reset-password">
  <h4 class="reset-password__header">Enter new password</h4>
  <div class="reset-password__content">
    <form ng-submit="submit(form)" name="form" novalidate="novalidate">
      <!--.form-group
      input.form-control.form-control-underline(
        name="token",
        type="text",
        ng-model="model.token",
        readonly,
        disabled,
        required,
        placeholder="Reset password token. Sent to email."
      )
      -->
      <div class="form-group text-right"><span class="form-control-underline-subtitle" ng-switch="complexity.score" ng-if="form.new_password.$dirty"><span ng-switch-when="0">Too short</span><span ng-switch-when="1">Week</span><span ng-switch-when="2">Fair</span><span ng-switch-when="3">Good</span><span ng-switch-when="4">Strong</span></span>
        <input class="form-control form-control-underline" name="new_password" type="password" ng-model="model.password" ng-model-options="{allowInvalid: true}" minlength="6" maxlength="32" pattern=".*(?=.*[A-Z]+)(?=.*[a-z]+)(?=.*[\d]+).*" required="required" autocomplete="off" placeholder="New password"/>
        <div class="form-control-underline-complexity" complexity="complexity" complexity-password="model.password"></div>
        <div class="form-control-error" ng-messages="form.new_password.$error" ng-if="form.new_password.$dirty || form.$submitted">
          <div ng-message="pattern">{{'validation.errors.invalid_password'|translate}}</div>
          <div ng-message="minlength">{{'validation.errors.password_minlength'|translate}}</div>
        </div>
      </div>
      <div class="btn-actions text-center">
        <button class="btn btn-submit" type="submit">Submit</button>
      </div>
    </form>
  </div>
</div>
