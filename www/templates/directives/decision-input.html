
<div ng-form="decisionInput">
  <div ng-if="type == $root.APP.decisionTypes.alphaNumeric">
    <input class="form-control" type="text" ng-model="$parent.model" typeahead-min-length="0" uib-typeahead="decision for decision in getDecisions($viewValue) | filter:$viewValue " validate="alphadashed" typeahead-append-to-body="true" typeahead-on-select="onSelect($item)" name="input" placeholder="{{placeholder}}" ng-readonly="readonly" required="required"/>
    <div class="form-control-error" ng-messages="decisionInput.input.$error" ng-show="decisionInput.input.$dirty">
      <div ng-message="alphadashed">{{'validation.errors.alphadashed_only'|translate}}</div>
      <div ng-message="required">{{'validation.errors.decision_empty'|translate}}</div>
    </div>
  </div>
  <div ng-if="type == $root.APP.decisionTypes.string">
    <input class="form-control" type="text" ng-model="$parent.model" typeahead-min-length="0" uib-typeahead="decision for decision in getDecisions($viewValue) | filter:$viewValue " typeahead-append-to-body="true" typeahead-on-select="onSelect($item)" name="input" placeholder="{{placeholder}}" ng-readonly="readonly" required="required"/>
    <div class="form-control-error" ng-messages="decisionInput.input.$error" ng-show="decisionInput.input.$dirty">
      <div ng-message="required">{{'validation.errors.decision_empty'|translate}}</div>
    </div>
  </div>
  <div ng-if="type == $root.APP.decisionTypes.numeric">
    <input class="form-control" type="number" name="input" ng-model="$parent.model" ng-readonly="readonly" required="required" placeholder="{{placeholder}}"/>
    <div class="form-control-error" ng-messages="decisionInput.input.$error" ng-show="decisionInput.input.$dirty">
      <div ng-message="required">{{'validation.errors.decision_empty'|translate}}</div>
      <div ng-message="number">{{'validation.errors.number_only'|translate}}</div>
    </div>
  </div>
  <div ng-if="type == $root.APP.decisionTypes.json">
    <textarea class="form-control" name="input" ng-model="$parent.model" ng-blur="$parent.$parent.save()" required="required" validate="json" ng-readonly="readonly" placeholder="{{placeholder}}"></textarea>
    <div class="form-control-error" ng-messages="decisionInput.input.$error" ng-show="decisionInput.input.$dirty">
      <div ng-message="json">{{'validation.errors.invalid_json'|translate}}</div>
    </div>
  </div>
</div>
