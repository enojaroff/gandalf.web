
<div class="field">
  <div ng-if="type == $root.APP.types.number">
    <!--.input-group-addon-->
    <select class="field-condition form-control" ng-model="$parent.condition" ng-options="(item | condition) for item in conditions.number"></select>
    <condition-input class="field-value" type="condition" number="true" value="$parent.value" disabled="!hasInput(condition)" required="hasInput(condition)"></condition-input>
  </div>
  <div ng-if="type == $root.APP.types.bool">
    <boolean-select class="field-condition" value="$parent.value" condition="$parent.condition"></boolean-select>
  </div>
  <div ng-if="type == $root.APP.types.string">
    <!--.input-group-addon-->
    <select class="field-condition form-control" ng-model="$parent.condition" ng-options="(item | condition) for item in conditions.string"></select>
    <condition-input class="field-value" type="condition" value="$parent.value" disabled="!hasInput(condition)" required="hasInput(condition)"></condition-input>
    <!--input.form-control(ng-model="$parent.value", )-->
  </div>
</div>
